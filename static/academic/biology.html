<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Title</title>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/7.0.5/marked.min.js"></script>
	<script>
		$(function (){
			$.ajax({
				type:"get",
				url:"/readme.md",
				dataType:"html",
				success:function(res){
					$("#content").append(marked(res));
				}
			})
		})
	</script>
</head>
<body>
<div id="content"></div>
</body>

</html>
